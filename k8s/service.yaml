---
apiVersion: v1
kind: Service
metadata:
  name: langlearn-db-service
spec:
  type: LoadBalancer
  selector:
    app: langlearn-db
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: v1
kind: Service
metadata:
  name: langlearn-backend-service
spec:
  selector:
    app: langlearn-backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: langlearn-frontend-service
spec:
  type: NodePort
  selector:
    app: langlearn-frontend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080