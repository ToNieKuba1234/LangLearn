name: CI

on: 
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Compile source code
        run: mvn clean compile 

      - name: Run Tests
        run: mvn test

      - name: Build .jar
        run: mvn package -DskipTests