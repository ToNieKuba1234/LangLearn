<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Logowanie</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <section class="">
        <h2 class="font-bold">Zaloguj się</h2>
        <form th:action="@{/process-login}" method="post">
            <div>
                <label>Użytkownik:</label>
                <input type="text" name="username" class="border-[1px] border-black" placeholder="username"/>
            </div>
            <div>
                <label>Hasło:</label>
                <input type="password" name="password" class="border-[1px] border-black" placeholder="password"/>
            </div>
            <button type="submit">Zaloguj</button>
        </form>
    </section>
</body>
</html>
