<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Logowanie</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="flex flex-col justify-center items-center h-screen bg-[#FAFAFA]">
        <form th:action="@{/process-login}" method="post" class="flex flex-col justify-around items-center w-1/3 h-3/5 rounded-2xl shadow-2xl bg-white">
            <h2 class="font-bold text-5xl text-center m-4">Lang Learn</h2>
            <div>
                <input type="text" name="username" class="border border-black m-4 p-4 rounded-xl w-full text-xl" placeholder="username"/>
                <input type="password" name="password" class="border border-black m-4 p-4 rounded-xl w-full text-xl" placeholder="password"/>
            </div>
            <button type="submit" class="border p-4 rounded-xl w-[300px] font-bold text-xl cursor-pointer hover:bg-[#FAFAFA] ">Sign in</button>
        </form>
    </div>
</body>
</html>
